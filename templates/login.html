{% extends 'base.html' %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card p-4 shadow-lg border-0" style="width: 100%; max-width: 400px; background: rgba(27, 38, 59, 0.85); backdrop-filter: blur(10px);">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-white"><i class="fas fa-sign-in-alt me-2 text-success"></i>Login</h2>
            <p class="text-muted small">Welcome back to Assisto Dashboard</p>
        </div>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label text-light small fw-bold">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-0 text-success"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" name="username" placeholder="Your username" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label text-light small fw-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-0 text-success"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" name="password" placeholder="Your password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold py-2 shadow-sm">
                <i class="fas fa-door-open me-2"></i>Sign In
            </button>
        </form>
        <div class="text-center mt-4">
            <p class="mb-0 text-muted small">New to Assisto? <a href="{{ url_for('register') }}" class="text-success text-decoration-none fw-bold">Register & Bind Device</a></p>
        </div>
    </div>
</div>
{% endblock %}
